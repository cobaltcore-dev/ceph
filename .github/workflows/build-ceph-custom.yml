name: Build Custom Ceph Image (with Upstream PRs)

on:
  workflow_dispatch:
    inputs:
      pr_numbers:
        description: 'List of Upstream PR numbers (space separated, e.g., "62163 59858")'
        required: false
        type: string
      ceph_tag:
        description: 'Base Ceph Version'
        required: true
        default: 'v19.2.3'
      push_image:
        description: 'Push image to GitHub Packages?'
        type: boolean
        default: true

jobs:
  build-ceph:
    name: Build Ceph Squid
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      # --- 1. SETUP & CLEAN ---
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ceph_tag }}
          submodules: recursive
          fetch-depth: 0

      - name: Clean Workspace
        run: |
          echo "Cleaning workspace to ensure no artifacts remain..."
          git clean -fdx
          git submodule foreach --recursive git clean -fdx
          git submodule update --init --recursive

      # --- 2. APPLY PULL REQUESTS ---
      - name: Apply Upstream PRs
        if: "${{ inputs.pr_numbers != '' }}"
        run: |
          # 1. Clean up old remote to prevent "already exists" error
          git remote remove upstream 2>/dev/null || true
          
          # 2. Add 'upstream' remote
          git remote add upstream https://github.com/ceph/ceph.git
          git fetch upstream

          # 3. Process the PRs
          PRS="${{ inputs.pr_numbers }}"
          echo "Applying PRs from upstream: $PRS"
          
          for PR in $PRS; do
            echo "Fetching upstream PR #$PR..."
            git fetch -f upstream pull/$PR/head:pr-$PR
            
            echo "Merging PR #$PR..."
            git config user.email "ci-bot@example.com"
            git config user.name "CI Bot"
            git merge --no-edit pr-$PR
          done
          
          # 4. REPAIR SUBMODULES (CRITICAL FIX FOR S3SELECT)
          echo "Repairing submodules..."
          
          # A. Sync URLs first! (This fixes the 'not our ref' error if the URL changed)
          git submodule sync --recursive
          
          # B. Aggressively remove problematic submodule artifacts
          # We remove the directory AND deinit to force a clean clone
          rm -rf src/s3select src/jaegertracing/opentelemetry-cpp
          git submodule deinit -f src/s3select || true
          git submodule deinit -f src/jaegertracing/opentelemetry-cpp || true
          
          # C. Update everything forcing a fresh download
          git submodule update --init --recursive --force

      # --- 3. PATCH BUILD ENVIRONMENT ---
      - name: Patch Builder Script
        run: |
          sed -i 's/dnf install -y \/usr\/bin\/rpmbuild/dnf install -y --allowerasing \/usr\/bin\/rpmbuild/g' src/script/buildcontainer-setup.sh

      # --- 4. COMPILE CEPH ---
      - name: Compile RPMs
        run: |
          CORE_COUNT=$(nproc)
          MEM_GB=$(free -g | awk '/^Mem:/{print $2}')
          JOBS=$((MEM_GB / 2))
          [[ $JOBS -lt 2 ]] && JOBS=2
          [[ $JOBS -gt $CORE_COUNT ]] && JOBS=$CORE_COUNT
          export NINJAJOBS=$JOBS

          ./src/script/build-with-container.py \
            -d centos9 \
            -e rpm \
            -- \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DENABLE_LTO=OFF \
            -DWITH_TESTS=OFF

      # --- 5. OPTIMIZE (SLIM DOWN) ---
      - name: Filter RPMs
        run: |
          mkdir -p staging_rpms
          find rpmbuild/RPMS -name "*.rpm" \
            ! -name "*debuginfo*" ! -name "*debugsource*" \
            ! -name "*devel*" ! -name "*test*" ! -name "*static*" \
            -exec cp {} staging_rpms/ \;

      # --- 6. GENERATE DOCKERFILE ---
      - name: Generate Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM quay.io/centos/centos:stream9
          RUN dnf install -y epel-release && /usr/bin/crb enable && dnf makecache
          RUN dnf install -y lvm2 python3 python3-pyyaml libibverbs librdmacm \
              libicu libaio nss nspr cryptsetup lua-devel && dnf clean all
          COPY staging_rpms/*.rpm /tmp/rpms/
          RUN dnf localinstall -y /tmp/rpms/*.rpm --skip-broken --setopt=install_weak_deps=False && \
              dnf clean all && rm -rf /tmp/rpms
          RUN mkdir -p /var/run/ceph /var/lib/ceph /var/log/ceph && \
              chmod 770 /var/run/ceph /var/lib/ceph /var/log/ceph
          ENTRYPOINT ["/usr/bin/ceph"]
          EOF

      # --- 7. PUSH IMAGE ---
      - name: Lowercase Repo Name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        if: ${{ inputs.push_image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}:${{ inputs.ceph_tag }}
            ghcr.io/${{ env.REPO_LOWER }}:latest
